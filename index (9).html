<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Broker in a Box · Rocket Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --maroon:#4b0d1f;
    --maroon-deep:#3c0918;
    --maroon-line:#6b1830;
    --red:#e8251a;
    --red-dark:#c81c12;
    --pink:#fbe4ec;
    --pink-ink:#e8251a;
    --cream:#ece4d6;
    --panel:#f1ebe1;
    --card:#ffffff;
    --ink:#211a1c;
    --muted:#6f6862;
    --faint:#9a938c;
    --line:#e5ddd0;
    --card-line:#ece7de;
    --green-bg:#def1e2;--green-ink:#1d7a3e;
    --amber-bg:#fdeecd;--amber-ink:#96690f;
    --rose-nav:#c98d9b;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }
  .frame{max-width:1080px;margin:0 auto;background:transparent}
  .page{background:#fdfbf7;box-shadow:0 0 0 1px rgba(0,0,0,.04),0 24px 60px rgba(60,9,24,.10);border-radius:0 0 22px 22px;overflow:hidden;margin-bottom:56px}
  @media(min-width:1120px){.frame{padding:28px 0 0}.page{border-radius:22px}}

  /* ─── Masthead ─── */
  .masthead{background:var(--maroon);color:#fff;position:relative;overflow:hidden}
  .masthead-inner{padding:34px 40px 0;position:relative}
  .brand-row{display:flex;align-items:center;gap:16px;position:relative;padding-bottom:18px}
  .brand-icon{width:46px;height:46px;flex:none;display:flex;align-items:center;justify-content:center;font-size:34px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35))}
  .brand-title{font-size:clamp(30px,4.6vw,46px);font-weight:800;letter-spacing:-.5px;line-height:1.05;position:relative;z-index:2}
  .pulse-line{position:absolute;left:0;right:0;top:52px;height:26px;width:100%;z-index:1;opacity:.9;pointer-events:none}
  .meta-row{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.14);padding:14px 0 16px;font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.92)}
  .meta-row .dim{color:rgba(255,255,255,.62)}
  /* tabs */
  .tabs{display:flex;gap:4px;padding:0 24px;overflow-x:auto;scrollbar-width:none;background:var(--maroon)}
  .tabs::-webkit-scrollbar{display:none}
  .tab{appearance:none;border:0;background:transparent;color:var(--rose-nav);font:800 12px/1 'Plus Jakarta Sans',sans-serif;letter-spacing:.12em;text-transform:uppercase;padding:16px 16px 15px;cursor:pointer;position:relative;white-space:nowrap;transition:color .15s}
  .tab:hover{color:#fff}
  .tab.active{color:#fff}
  .tab.active::after{content:"";position:absolute;left:10px;right:10px;bottom:0;height:4px;background:var(--red);border-radius:3px 3px 0 0}
  .tab:focus-visible{outline:2px solid #fff;outline-offset:-4px;border-radius:6px}

  /* ─── Layout ─── */
  .content{padding:34px 40px 10px;background:#fdfbf7}
  @media(max-width:640px){.masthead-inner{padding:26px 20px 0}.content{padding:26px 18px 8px}.tabs{padding:0 8px}}
  section{margin-bottom:34px}
  .rule{height:4px;background:var(--red);border-radius:2px;margin:6px 0 28px}

  .kicker{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .kicker-label{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}
  .kicker-emoji{font-size:19px}
  h1.display{font-size:clamp(26px,3.6vw,36px);font-weight:800;letter-spacing:-.4px;margin-bottom:10px}
  h2.section-title{font-size:clamp(19px,2.6vw,24px);font-weight:800;letter-spacing:-.2px;margin-bottom:10px}
  .lead{font-size:16.5px;color:#3b3436;max-width:820px}
  .lead b,.lead strong{color:var(--ink)}

  /* ─── Panels & cards ─── */
  .panel{background:var(--panel);border-radius:var(--radius);padding:26px 28px;margin-bottom:26px}
  .card{background:var(--card);border:1px solid var(--card-line);border-radius:14px;padding:20px 22px}
  .hero{background:var(--maroon);color:#fff;border-radius:var(--radius);padding:28px 30px;margin-bottom:26px}
  .hero h3{font-size:clamp(19px,2.6vw,24px);font-weight:800;letter-spacing:-.2px;margin:12px 0 10px}
  .hero p{color:rgba(255,255,255,.92);font-size:15.5px;max-width:860px}
  .hero p b{color:#fff}
  .hero .btn{margin-top:18px}

  /* ─── Pills & badges ─── */
  .pill{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--card-line);border-radius:999px;padding:8px 14px;font-size:13.5px;font-weight:500;color:#37312f}
  .pill b{font-weight:800;color:var(--ink)}
  .pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .badge{display:inline-block;border-radius:999px;padding:5px 12px;font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  .badge.dark{background:rgba(255,255,255,.12);color:#fff}
  .badge.pink{background:var(--pink);color:var(--red)}
  .badge.green{background:var(--green-bg);color:var(--green-ink)}
  .badge.amber{background:var(--amber-bg);color:var(--amber-ink)}
  .badge.outline{background:#fff;border:1px solid var(--card-line);color:#37312f}

  /* ─── Callouts ─── */
  .callout{background:var(--pink);border-radius:12px;padding:16px 20px;margin-top:16px}
  .callout .co-label{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:6px}
  .callout p{font-size:15px;color:#3b2a30}
  .callout.quote p{font-style:italic;font-weight:500;color:#442732}

  /* ─── Buttons ─── */
  .btn{display:inline-flex;align-items:center;gap:8px;border-radius:9px;padding:12px 20px;font:800 14px/1 'Plus Jakarta Sans',sans-serif;text-decoration:none;cursor:pointer;border:0;transition:transform .12s,box-shadow .12s}
  .btn:hover{transform:translateY(-1px)}
  .btn.red{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(232,37,26,.28)}
  .btn.red:hover{background:var(--red-dark)}
  .btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.65)}
  .btn.ghost:hover{border-color:#fff}
  .btn .arrow{font-weight:800}

  /* ─── Stats ─── */
  .stat-grid{display:grid;gap:14px;margin-top:16px}
  .stat-grid.c3{grid-template-columns:repeat(3,1fr)}
  .stat-grid.c4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:820px){.stat-grid.c3,.stat-grid.c4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.stat-grid.c3,.stat-grid.c4{grid-template-columns:1fr}}
  .stat{background:#fff;border:1px solid var(--card-line);border-radius:12px;padding:18px 20px}
  .stat .num{font-size:clamp(24px,3vw,30px);font-weight:800;letter-spacing:-.5px;color:#7a1226}
  .stat .num.red{color:var(--red)}
  .stat .num small{font-size:.55em;font-weight:700;color:var(--muted)}
  .stat .cap{font-size:11.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-top:6px;line-height:1.5}
  .stat .sub{font-size:13.5px;color:#4c4540;margin-top:6px}

  /* ─── Move / phase cards ─── */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .move{background:#fff;border:1px solid var(--card-line);border-radius:16px;padding:24px 26px}
  .move-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .numc{width:34px;height:34px;flex:none;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
  .move-head h3{font-size:19px;font-weight:800;letter-spacing:-.2px}
  .move p.body{font-size:15px;color:#3b3436}
  .move .foot{font-size:13.5px;color:var(--faint);margin-top:12px}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12.5px;color:#8b837a;letter-spacing:0}

  /* ─── Numbered list rows (flip-strategy style) ─── */
  .rows{margin-top:14px}
  .row{display:flex;gap:14px;align-items:flex-start;padding:15px 4px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .row .numc{width:28px;height:28px;font-size:13px;margin-top:1px}
  .row p{font-size:15px;color:#3b3436}
  .row p b{color:var(--ink)}

  /* ─── Vendor / info blocks ─── */
  .info-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .info-title{font-size:clamp(18px,2.4vw,22px);font-weight:800;letter-spacing:-.2px;margin-bottom:8px}
  .checkpill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--card-line);border-radius:999px;padding:8px 14px;font-size:13.5px;font-weight:600;color:#2f4436}
  .checkpill .ck{color:var(--green-ink);font-weight:800}

  /* ─── FAQ ─── */
  .faq{background:#fff;border:1px solid var(--card-line);border-radius:14px;margin-bottom:14px;overflow:hidden}
  .faq button{appearance:none;border:0;background:transparent;width:100%;text-align:left;padding:18px 22px;font:800 16px/1.4 'Plus Jakarta Sans',sans-serif;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;gap:14px;align-items:center}
  .faq .chev{color:var(--red);font-weight:800;transition:transform .18s}
  .faq.open .chev{transform:rotate(90deg)}
  .faq .a{padding:0 22px 18px;font-size:15px;color:#3b3436}
  .faq .a b{color:var(--ink)}

  /* ─── Footer feedback ─── */
  .feedback{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;border-top:1px solid var(--line);padding:26px 0 34px;margin-top:10px}
  .feedback h4{font-size:17px;font-weight:800}
  .feedback p{font-size:14px;color:var(--muted)}
  .base{background:var(--maroon);height:14px}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

const APP_URL = "#"; // ← swap in the Broker in a Box app URL (broker-in-a-box.vercel.app)

/* ── Masthead pulse line: EKG with a box-shaped blip (the "box" signature) ── */
const PulseLine = () => (
  <svg className="pulse-line" viewBox="0 0 1000 26" preserveAspectRatio="none" aria-hidden="true">
    <polyline points="0,13 560,13 585,13 592,3 592,23 612,23 612,3 620,13 700,13 1000,13"
      fill="none" stroke="#e8251a" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>
);

const Callout = ({label, children, quote}) => (
  <div className={"callout" + (quote ? " quote" : "")}>
    <span className="co-label">{label} →</span>
    <p>{children}</p>
  </div>
);

const Feedback = () => (
  <div className="feedback">
    <div>
      <h4>Got a question this kit doesn't answer?</h4>
      <p>Tell the PDM team what's missing — this box gets restocked every month.</p>
    </div>
    <a className="btn red" href="#">Share feedback <span className="arrow">→</span></a>
  </div>
);

/* ════════ TAB 1 · THE BOX ════════ */
const TheBox = ({go}) => (
  <div>
    <section className="panel">
      <div className="kicker"><span className="kicker-emoji">📦</span><span style={{fontSize:19,fontWeight:800}}>Welcome to Broker in a Box</span></div>
      <p className="lead">Everything a loan officer needs to open their own brokerage — <b>what it takes, what it costs, and what the first 90 days look like.</b> One kit, zero guesswork, backed by Rocket Pro from day one.</p>
    </section>

    <div className="rule"></div>

    <section>
      <div className="kicker">
        <span className="kicker-label">The pitch, in one screen</span>
        <span className="badge pink">90-sec scan</span>
      </div>
      <h1 className="display">Own the shop. Keep the spread.</h1>
      <p className="lead">One curated kit. <b>Everything between "I've thought about it" and a funded first file.</b></p>
    </section>

    <section className="hero">
      <span className="badge dark">WHY NOW · THE BROKER CHANNEL IS WINNING</span>
      <h3>Great LOs are leaving retail — the ones who own the shop keep the upside.</h3>
      <p>Wholesale share keeps climbing, broker comp runs well past retail splits, and the tech stack that used to take a year to assemble now comes <b>pre-picked, pre-priced, and pre-integrated</b>. Broker in a Box turns "someday" into a dated launch plan — <b>with Rocket Pro as your first approval.</b></p>
      <a className="btn ghost" href={APP_URL}>Open the BIB App <span className="arrow">→</span></a>
    </section>

    <section className="panel">
      <div className="kicker"><span className="kicker-emoji">🚀</span><span className="kicker-label">New · The 90-day launch path</span></div>
      <h2 className="section-title">Mission: Day One</h2>
      <p className="lead">Five phases from decision to first submission. Most launches land in <b>60–90 days</b> — licensing timelines set the pace.</p>
      <div className="card" style={{marginTop:16}}>
        <p style={{fontSize:15}}>The pace to hit, by phase: <b>Decide 0–15 · Entity &amp; License 15–45 · Approvals 45–70 · Stack 60–85 · Launch by 90</b>.</p>
      </div>
      <div className="pill-row">
        <span className="pill"><b>Phase 1</b> · Decide &amp; document</span>
        <span className="pill"><b>Phase 2</b> · Entity &amp; licensing</span>
        <span className="pill"><b>Phase 3</b> · Lender approvals</span>
        <span className="pill"><b>Phase 4</b> · Vendor stack</span>
        <span className="pill"><b>Phase 5</b> · Launch</span>
      </div>
      <Callout label="Start now">The BIB app tracks every checklist item and lights up your roadmap as you go — approval comes with confetti.</Callout>
      <button className="btn red" style={{marginTop:18}} onClick={()=>go("roadmap")}>See the full Roadmap <span className="arrow">→</span></button>
    </section>

    <section>
      <div className="kicker"><span className="kicker-emoji">🏆</span><span className="kicker-label">What owners keep</span></div>
      <div className="panel">
        <span className="badge pink">COMP · THE HEADLINE NUMBERS</span>
        <h2 className="section-title" style={{marginTop:10}}>The math is the pitch — ownership pays.</h2>
        <div className="stat-grid c3">
          <div className="stat"><div className="num red">150–275<small> bps</small></div><div className="cap">Typical broker-owner revenue per loan</div></div>
          <div className="stat"><div className="num">vs ~70–100<small> bps</small></div><div className="cap">Typical retail LO comp plan</div></div>
          <div className="stat"><div className="num">60–90<small> days</small></div><div className="cap">Decision to first submission</div></div>
        </div>
        <Callout label="The move">Run an LO's own trailing-12 production through the Economics tab — their numbers, not ours.</Callout>
      </div>
    </section>

    <section>
      <div className="kicker"><span className="kicker-emoji">📊</span><span className="kicker-label">What's in the box</span><span className="badge pink">Full inventory</span></div>
      <h2 className="section-title">Four things every launch needs — all packed.</h2>
      <div className="stat-grid c4">
        <div className="stat"><div className="num">01</div><div className="cap">The Roadmap</div><div className="sub">A dated, phase-by-phase launch plan with every filing and form.</div></div>
        <div className="stat"><div className="num">02</div><div className="cap">The Vendor Stack</div><div className="sub">Pre-vetted picks for LOS, pricing, credit, CRM, and coverage.</div></div>
        <div className="stat"><div className="num">03</div><div className="cap">The Economics</div><div className="sub">Honest startup costs and the comp math, side by side.</div></div>
        <div className="stat"><div className="num">04</div><div className="cap">Day-One Pipeline</div><div className="sub">Rocket Pro approval teed up so the first file has a home.</div></div>
      </div>
      <Callout label="From leadership">Every LO who opens a shop with the box launches as a Rocket Pro partner — this is Partner Share of Market, built one owner at a time.</Callout>
    </section>

    <Feedback/>
  </div>
);

/* ════════ TAB 2 · ROADMAP ════════ */
const phases = [
  {n:1, title:"Decide & Document", tag:"DAYS 0–15", body:"Pressure-test the decision with real numbers. Pull trailing-12 production, current comp plan, and the book's referral mix. If the math clears, name the company and claim the domain.",
   chips:["Trailing-12 production pull","Comp plan comparison","Business name + domain","Exit-clause review"],
   note:"An LO with a non-solicit or transition clause needs eyes on it now — not in Phase 5."},
  {n:2, title:"Entity & Licensing", tag:"DAYS 15–45", body:"Form the entity, then file the company license through NMLS. State timelines set the critical path for the whole launch — start this the moment Phase 1 clears.",
   chips:["LLC / entity formation","Company NMLS (Form MU1)","State license filings","Surety bond","E&O policy"],
   note:"Licensing is the long pole. Everything else in the box can run in parallel behind it."},
  {n:3, title:"Lender Approvals", tag:"DAYS 45–70", body:"Apply for wholesale approvals while licensing finishes. Rocket Pro first, then one or two more so day one has options. Net-worth and experience docs go in this packet.",
   chips:["Rocket Pro partner application","Financial / net-worth docs","2–3 lender approvals for day one"],
   note:"The Rocket Pro application is pre-staged in the BIB app — approval triggers the confetti."},
  {n:4, title:"Vendor Stack", tag:"DAYS 60–85", body:"Stand up the tech: LOS, pricing engine, credit vendor, CRM, and e-sign. Every category has a pre-vetted pick in the Vendor Stack tab with BIB pricing already negotiated.",
   chips:["LOS live","Pricing engine connected","Credit vendor account","CRM + e-sign"],
   note:"Don't boil the ocean — the starter stack is five tools. Add the rest after month three."},
  {n:5, title:"Launch", tag:"DAY 90", body:"First file in. Announce to the referral network, run the pipeline-transfer plan, and submit loan number one through Rocket Pro.",
   chips:["Announcement plan","Referral partner outreach","First submission 🎉"],
   note:"A launch without a first file dated on the calendar is still a plan, not a launch."},
];

const Roadmap = () => (
  <div>
    <section>
      <div className="kicker"><span className="kicker-emoji">🗺️</span><span className="kicker-label">The Roadmap</span><span className="badge outline"><b>5 phases</b>&nbsp;· 90 days</span></div>
      <p className="lead"><b>The full LO-to-owner launch path.</b> Each phase is a checklist in the BIB app — items check off, the roadmap lights up, and the timeline holds itself accountable.</p>
    </section>

    <section className="hero" style={{padding:"24px 30px"}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:14,flexWrap:"wrap",alignItems:"center"}}>
        <span className="badge dark">TRACKING · IN THE APP</span>
        <span className="badge green">LIVE NOW</span>
      </div>
      <h3>Every item below is trackable in the Broker in a Box app.</h3>
      <p>Progress carries across phases — start the roadmap the day the decision is made and the app keeps the launch date honest.</p>
      <a className="btn ghost" href={APP_URL}>Open my Roadmap <span className="arrow">→</span></a>
    </section>

    <div className="grid2">
      {phases.map(p=>(
        <div className="move" key={p.n}>
          <div className="move-head">
            <div className="numc">{p.n}</div>
            <h3>{p.title}</h3>
            <span className="badge pink">{p.tag}</span>
          </div>
          <p className="body">{p.body}</p>
          <div className="pill-row">{p.chips.map(c=><span className="pill" key={c}>{c}</span>)}</div>
          <Callout label="Don't skip">{p.note}</Callout>
        </div>
      ))}
      <div className="move" style={{background:"var(--panel)",border:0,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <div className="kicker"><span className="kicker-emoji">⏱️</span><span className="kicker-label">Pace check</span></div>
        <p className="body" style={{fontSize:15}}>Phases 2 and 3 overlap on purpose — <b>licensing runs while approvals queue.</b> If the state license lands early, the whole launch pulls left.</p>
        <p className="mono" style={{marginTop:14}}>Critical path: entity → NMLS MU1 → state license → first submission</p>
      </div>
    </div>

    <Feedback/>
  </div>
);

/* ════════ TAB 3 · VENDOR STACK ════════ */
const vendors = [
  {cat:"LOS · LOAN ORIGINATION", badge:"BIB PICK", green:true, title:"The system of record — pick once, pick right.",
   body:"Broker-first LOS platforms keep setup measured in days, not months, and talk natively to wholesale lenders. The BIB pick comes pre-configured with the Rocket Pro connection.",
   chips:["Broker-first platform","Rocket Pro integration","Doc management built in"], btn:"LOS One-Pager"},
  {cat:"PRICING ENGINE (PPE)", badge:"BIB PICK", green:true, title:"Price every file across the panel in seconds.",
   body:"A pricing engine is the daily proof that independence pays — quote the whole lender panel side by side and win on the number with confidence.",
   chips:["Multi-lender pricing","Rate-lock workflow","Scenario quoting"], btn:"Pricing One-Pager"},
  {cat:"CREDIT & VERIFICATIONS", badge:"REQUIRED", green:false, title:"Credit vendor account — set it up in Phase 4.",
   body:"A brokerage pulls its own credit. The account setup takes about a week with a new entity, so it's sequenced right after licensing clears.",
   chips:["Tri-merge reports","Soft-pull option","VOE / VOI add-ons"], btn:"Credit Setup Guide"},
  {cat:"CRM & MARKETING", badge:"RECOMMENDED", green:false, title:"The book is the business — protect it from day one.",
   body:"Move the referral network and past-client list into a CRM the LO owns before launch day. The kit includes announcement templates and a 90-day drip.",

  {cat:"E-SIGN & OPS", badge:"REQUIRED", green:false, title:"The unglamorous stack that keeps files moving.",
